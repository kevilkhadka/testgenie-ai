# ================================
# TestGenie AI - Application Config
# ================================

server.port=8080

# --- Claude API (Anthropic) ---
# Get your key at: https://console.anthropic.com
claude.api.key=YOUR_CLAUDE_API_KEY_HERE
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514
claude.api.max-tokens=2000

# --- CORS (allow React dev server) ---
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# --- Logging ---
logging.level.com.testgenie=DEBUG